<div class="relative min-h-screen w-full">
  <div class="fixed inset-0 bg-[url('/assets/fondo.jpeg')] bg-cover bg-center bg-no-repeat"></div>
  <div class="fixed inset-0 bg-black/10 shadow-[inset_0_0_100px_rgba(0,0,0,0.2)]"></div>

  <div class="relative z-10 min-h-screen flex flex-col">
    <div
      class="w-full p-5 md:p-8 bg-black/50 shadow-[0_-10px_25px_-5px_rgba(0,0,0,0.7),_0_8px_25px_rgba(0,0,0,0.9)] relative"></div>
    <img src="assets/Captura_de_pantalla_2026-03-18_165807-removebg-preview.png"
         class="absolute top-1 left-1/2 transform -translate-x-1/2 w-auto h-18 md:h-28 z-20"
         alt="Logo">

    <div class="flex-1 h-full bg-black/30 border-t flex items-start justify-center p-2 sm:p-4 relative">
      <div
        class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_transparent_40%,_rgba(0,0,0,0.25)_100%)] pointer-events-none"></div>
      <div
        class="absolute top-0 left-0 w-full h-12 bg-gradient-to-b from-black/10 to-transparent pointer-events-none"></div>
      <div class="content mt-7">
        <div class="header flex flex-col items-center justify-center">
          <span class="text-white font-regular text-lg md:text-2xl  tracking-[0.25em]"
                style="font-family: 'Cinzel', serif; text-shadow: 0 0 10px rgba(255,255,255,0.5);">
                Encuentro de Líderes {{currentYear}}
          </span>
          <div class="relative w-full mt-3 flex justify-center items-center">
            <div
              class="absolute w-full h-0.5 bg-gradient-to-r from-transparent via-white/20 to-transparent blur-[8px] opacity-100"></div>
            <div
              class="absolute w-[95%] h-[1px] bg-gradient-to-r from-transparent via-white/80 to-transparent blur-[3px] opacity-100"></div>
            <div
              class="absolute w-[70%] h-[1px] bg-gradient-to-r from-transparent via-white to-transparent blur-[1px] opacity-100"></div>
            <div
              class="absolute w-[30%] h-0.5 bg-gradient-to-r from-transparent via-white to-transparent blur-[0.5px]"></div>
            <div class="w-[15%] h-[1px] bg-white opacity-90 blur-[0.2px]"></div>
          </div>
        </div>

        <div class="form-container mt-6">
          <div class="flex flex-col justify-center items-center text-center w-full">
              <span class="text-white font-regular text-3xl md:text-5xl mb-3"
                    style="font-family: 'Cinzel', serif; text-shadow: 0 0 10px rgba(255,255,255,0.5);">
                Compromiso de liderazgo
              </span>
            <span class="text-white/80 text-sm md:text-lg lg:text-lg"
                  style="font-family: 'Cinzel', serif">
                Este es el momento de definir tu impacto.
              </span>
            <span class="text-white/80 text-sm md:text-lg lg:text-lg block mt-2"
                  style="font-family: 'Cinzel', serif">
                Comparte tu compromiso como líder para esta nueva etapa.
              </span>
          </div>

          <div class="w-full flex items-center justify-center p-4">
            <div class="w-full max-w-2xl">
              <form [formGroup]="compromisoForm" (ngSubmit)="onSubmit()" class="space-y-3">
                <div class="space-y-1">
                  <label class="text-white/90 text-xs md:text-sm tracking-wider block"
                         style="font-family: 'Cinzel', serif;">
                    Nombre:
                  </label>
                  <input
                    type="text"
                    formControlName="nombre"
                    class="w-full px-4 py-2 md:py-4 bg-black/30 border border-white/20 rounded-lg text-white placeholder-white/40 focus:outline-none focus:border-white/60 focus:bg-white/15 transition-all duration-300"
                    placeholder="Tu nombre completo"
                  >
                  <div *ngIf="nombre?.invalid && nombre?.touched" class="text-red-400 text-sm mt-1">
                    El nombre es requerido
                  </div>
                </div>

                <!-- Campo: Puesto -->
                <div class="space-y-1">
                  <label class="text-white/90 text-xs md:text-sm tracking-wider block"
                         style="font-family: 'Cinzel', serif;">
                    Puesto:
                  </label>
                  <input
                    type="text"
                    formControlName="puesto"
                    class="w-full px-4 py-2 md:py-4 bg-black/30 border border-white/20 rounded-lg text-white placeholder-white/40 focus:outline-none focus:border-white/60 focus:bg-white/15 transition-all duration-300"
                    placeholder="Tu puesto actual"
                  >
                  <div *ngIf="puesto?.invalid && puesto?.touched" class="text-red-400 text-sm mt-1">
                    El puesto es requerido
                  </div>
                </div>

                <!-- Campo: Sucursal -->
                <div class="space-y-1">
                  <label class="text-white/90 text-xs md:text-sm tracking-wider block"
                         style="font-family: 'Cinzel', serif;">
                    Sucursal:
                  </label>
                  <input
                    type="text"
                    formControlName="sucursal"
                    class="w-full px-4 py-2 md:py-4 bg-black/30 border border-white/20 rounded-lg text-white placeholder-white/40 focus:outline-none focus:border-white/60 focus:bg-white/15 transition-all duration-300"
                    placeholder="Tu sucursal"
                  >
                  <div *ngIf="sucursal?.invalid && sucursal?.touched" class="text-red-400 text-sm mt-1">
                    La sucursal es requerida
                  </div>
                </div>

                <!-- Campo: Textarea (Compromiso) -->
                <div class="space-y-1">
                  <textarea
                    formControlName="compromiso"
                    rows="5"
                    class="w-full px-4 py-2 md:py-4 bg-black/30 border border-white/20 rounded-lg text-white placeholder-white/40 focus:outline-none focus:border-white/60 focus:bg-white/15 transition-all duration-300 resize-none"
                    placeholder="¿Cuál es mi compromiso como líder para esta nueva etapa?"
                  ></textarea>
                  <div *ngIf="compromiso?.invalid && compromiso?.touched" class="text-red-400 text-sm mt-1">
                    El compromiso es requerido
                  </div>
                </div>

                <!-- Botón de envío -->
                <div class="flex justify-center pt-2 md:pt-4">
                  <button
                    type="submit"
                    [disabled]="compromisoForm.invalid"
                    class="px-12 py-2 relative overflow-hidden group backdrop-blur-xl bg-blue-900/10 border border-blue-400/30 rounded-md text-white transition-all duration-300 disabled:opacity-80 disabled:cursor-not-allowed hover:bg-blue-800/20 hover:border-blue-300/50"
                    style="font-family: 'Cinzel', serif; box-shadow: 0 15px 35px -8px rgba(0,100,255,0.3);">

                    <div
                      class="absolute inset-0 bg-gradient-to-br from-blue-800/20 via-blue-900/15 to-blue-950 rounded-md opacity-50"></div>
                    <div class="absolute inset-0 backdrop-blur-lg bg-blue-800/5 rounded-md"></div>
                    <div
                      class="absolute inset-0 bg-gradient-to-tr from-white/5 via-transparent to-blue-500/5 rounded-md"></div>

                    <!-- Brillo superior  -->
                    <div
                      class="absolute top-0 left-0 w-full h-[1px] rounded-md bg-gradient-to-r from-transparent via-white to-transparent blur-[1px] opacity-100"></div>
                    <div
                      class="absolute top-0 left-[15%] w-[70%] h-[1px] rounded-md bg-gradient-to-r from-transparent via-white to-transparent blur-[2px] opacity-90"></div>
                    <div
                      class="absolute top-0 left-[25%] w-[30%] h-[0.5px] rounded-md bg-gradient-to-r from-transparent via-white to-transparent opacity-100"></div>

                    <!-- Brillo inferior  -->
                    <div
                      class="absolute bottom-0 left-0 w-full h-[1px] rounded-md bg-gradient-to-r from-transparent via-white to-transparent blur-[1px] opacity-100"></div>
                    <div
                      class="absolute bottom-0 left-[15%] w-[70%] h-[2px] rounded-md bg-gradient-to-r from-transparent via-white to-transparent blur-[2px] opacity-90"></div>
                    <div
                      class="absolute bottom-0 left-[25%] w-[50%] h-[1px] rounded-md bg-gradient-to-r from-transparent via-white to-transparent opacity-100"></div>
                    <div
                      class="absolute bottom-0 left-[35%] w-[30%] h-[0.5px] rounded-md bg-white opacity-80 blur-[0.5px]"></div>

                    <div
                      class="absolute inset-0 bg-gradient-to-br from-white/10 via-transparent to-blue-500/10 rounded-md opacity-50 mix-blend-overlay"></div>

                    <span class="relative z-10 text-white/80 text-lg "
                          style="text-shadow: 0 0 15px rgba(255,255,255,0.8), 0 0 30px rgba(100,200,255,0.5);">Registrar compromiso</span>
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
